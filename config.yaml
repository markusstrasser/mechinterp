# Grokking Modular Arithmetic Configuration

# Model architecture
p: 113  # Prime for modular arithmetic
n_layers: 1
n_heads: 3
d_model: 32
d_ffn: 128

# Training parameters
lr: 0.001
weight_decay: 1.0
steps: 60001
eval_interval: 1000
seed: 43

# Dataset parameters
n_examples: 12769  # 113 * 113
frac_train: 0.3

# Probes to run during training
probes:
  - performance
  - l2_norm
  - sparsity
  - mechanics
  - fourier_structure

# W&B settings (optional - comment out to disable)
wandb_project: grokking-modular-arithmetic
# wandb_entity: your_entity_name  # Optional: your W&B username/org
checkpoint_interval: 10000

# Device will be auto-detected if not specified
# device: cuda